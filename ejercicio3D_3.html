<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propuesta 3</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

#info { 
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(20, 20, 20, 0.75);
    backdrop-filter: blur(10px);
    color: #ffffff;
    padding: 15px 18px;
    border-radius: 12px;
    font-size: 14px;
    width: 260px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div id="info">
    <strong>Manipulación interactiva 3D</strong><br><br>
    FLECHAS: Mover<br>
    Q / E: Rotar<br>
    Z / X: Escalar<br><br>
    <strong>Autor:</strong> Jhojan Aragón
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// ESCENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x20232a);

// CÁMARA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

// RENDER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// CUBO
const geometry = new THREE.BoxGeometry(1,1,1);
const material = new THREE.MeshNormalMaterial();
const cubo = new THREE.Mesh(geometry, material);
scene.add(cubo);

// LUZ
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// 🔒 LIMITES (para que no salga de pantalla)
const limites = {
    x: 3,
    y: 2
};

// CONTROLES
window.addEventListener('keydown', (event) => {
    switch(event.key) {

        // TRASLACIÓN CON LÍMITES
        case 'ArrowUp':
            cubo.position.y = Math.min(limites.y, cubo.position.y + 0.2);
            break;

        case 'ArrowDown':
            cubo.position.y = Math.max(-limites.y, cubo.position.y - 0.2);
            break;

        case 'ArrowLeft':
            cubo.position.x = Math.max(-limites.x, cubo.position.x - 0.2);
            break;

        case 'ArrowRight':
            cubo.position.x = Math.min(limites.x, cubo.position.x + 0.2);
            break;

        // ROTACIÓN
        case 'q':
        case 'Q':
            cubo.rotation.y -= 0.1;
            break;

        case 'e':
        case 'E':
            cubo.rotation.y += 0.1;
            break;

        // ESCALADO CON LÍMITES
        case 'z':
        case 'Z':
            cubo.scale.x = Math.min(2, cubo.scale.x + 0.1);
            cubo.scale.y = Math.min(2, cubo.scale.y + 0.1);
            cubo.scale.z = Math.min(2, cubo.scale.z + 0.1);
            break;

        case 'x':
        case 'X':
            cubo.scale.x = Math.max(0.2, cubo.scale.x - 0.1);
            cubo.scale.y = Math.max(0.2, cubo.scale.y - 0.1);
            cubo.scale.z = Math.max(0.2, cubo.scale.z - 0.1);
            break;
    }
});

// ANIMACIÓN
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

// RESPONSIVE
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
