<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Curvas Paramétricas</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:'Inter', sans-serif;
    background:linear-gradient(135deg,#020617,#020617,#0f172a);
    color:white;
    height:100vh;
    overflow:hidden;
}

/* TITULO MÁS PRO */
h2{
    text-align:center;
    color:#38bdf8;
    font-family:'Orbitron', sans-serif;
    letter-spacing:2px;
    text-shadow:0 0 15px rgba(56,189,248,0.6);
}

/* ECUACIÓN BONITA */
.ecuacion{
    margin-top:10px;
    padding:10px;
    text-align:center;
    font-family:'Orbitron', sans-serif;
    color:#22c55e;
    background:rgba(34,197,94,0.08);
    border-radius:10px;
    box-shadow:0 0 15px rgba(34,197,94,0.3);
}

/* SELECT MODERNO */
select{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:none;
    background:#1e293b;
    color:white;
    outline:none;
    cursor:pointer;
}

.back-btn{
    position:fixed; /* 🔥 clave: que no dependa del contenedor */
    top:20px;
    left:20px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    color:white;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 0 15px rgba(56,189,248,0.5);
    transition:0.3s;
    z-index:9999; /* 🔥 súper importante */
}

.back-btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 25px rgba(56,189,248,0.8);
}

/* CONTENEDOR */
.container{
    display:flex;
    height:100%;
    gap:10px;
    padding:10px;
}

/* PANEL BASE */
.left, .right{
    border-radius:20px;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(15px);
    box-shadow:0 20px 40px rgba(0,0,0,0.6);
    transition:0.3s;
}

.left:hover, .right:hover{
    transform:scale(1.005);
}

/* IZQUIERDA */
.left{
    width:50%;
    padding:20px;
    display:flex;
    flex-direction:column;
}

/* TITULO */
h2{
    text-align:center;
    color:#38bdf8;
    margin-bottom:10px;
    letter-spacing:1px;
    text-shadow:0 0 10px rgba(56,189,248,0.5);
}

/* CONTROLES */
.controls{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    box-shadow:inset 0 0 15px rgba(255,255,255,0.05);
}

/* GRUPOS */
.control-group{
    margin-bottom:15px;
}

/* LABEL */
label{
    font-size:13px;
    display:flex;
    justify-content:space-between;
    margin-bottom:5px;
    color:#cbd5f5;
}

/* SLIDER */
input[type="range"]{
    width:100%;
    appearance:none;
    height:6px;
    border-radius:10px;
    background:#1e293b;
    outline:none;
}

/* TRACK */
input[type="range"]::-webkit-slider-thumb{
    appearance:none;
    width:16px;
    height:16px;
    border-radius:50%;
    background:#38bdf8;
    cursor:pointer;
    box-shadow:0 0 10px #38bdf8;
    transition:0.2s;
}

input[type="range"]::-webkit-slider-thumb:hover{
    transform:scale(1.2);
}

/* CANVAS */
.canvas-container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

canvas{
    border-radius:15px;
    background:#020617;
    border:2px solid rgba(56,189,248,0.5);
    box-shadow:
        0 0 20px rgba(56,189,248,0.3),
        inset 0 0 30px rgba(0,0,0,0.8);
    transition:0.3s;
}

canvas:hover{
    box-shadow:
        0 0 30px rgba(56,189,248,0.6),
        inset 0 0 40px rgba(0,0,0,1);
}

/* DERECHA */
.right{
    width:50%;
    padding:15px;
    display:flex;
    flex-direction:column;
}

/* HEADER PDF */
.pdf-header{
    background:linear-gradient(90deg,#020617,#0f172a);
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    text-align:center;
    color:#38bdf8;
    font-weight:bold;
    letter-spacing:1px;
    box-shadow:0 0 15px rgba(56,189,248,0.3);
}

/* PDF */
.pdf-viewer{
    flex:1;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,0.7);
    border:1px solid rgba(255,255,255,0.05);
}

/* INFO */
.info{
    margin-top:10px;
    text-align:center;
    font-size:14px;
    color:#22c55e;
    padding:8px;
    border-radius:10px;
    background:rgba(34,197,94,0.08);
    box-shadow:0 0 10px rgba(34,197,94,0.2);
}
</style>
</head>

<body>
<button class="back-btn" onclick="volverInicio()">← Inicio</button>
<div class="container">

<!-- IZQUIERDA -->
<div class="left">

<h2>Curvas Paramétricas</h2>

<div class="controls">

<div class="control-group">
<label>Velocidad: <span id="vSpeed"></span></label>
<input type="range" id="speed" min="0.01" max="0.2" step="0.01" value="0.05">
</div>

<div class="control-group">
<label>Escala X: <span id="vScaleX"></span></label>
<input type="range" id="scaleX" min="50" max="200" value="150">
</div>

<div class="control-group">
<label>Escala Y: <span id="vScaleY"></span></label>
<input type="range" id="scaleY" min="50" max="200" value="150">
</div>

<div class="control-group">
<label>Frecuencia X: <span id="vFreqX"></span></label>
<input type="range" id="freqX" min="1" max="10" value="3">
</div>

<div class="control-group">
<label>Frecuencia Y: <span id="vFreqY"></span></label>
<input type="range" id="freqY" min="1" max="10" value="4">
</div>

<div class="control-group">
<label>Tipo</label>
<select id="type">
<option value="circle">Círculo</option>
<option value="spiral">Espiral</option>
<option value="lissajous">Lissajous</option>
</select>
</div>

<div class="ecuacion" id="ecuacion"></div>

</div>

<canvas id="canvas" width="600" height="400"></canvas>

</div>

<!-- DERECHA (PDF AUTOMÁTICO) -->
<div class="right">
    <object data="documento_1.pdf" type="application/pdf" width="100%" height="100%">
        <p>No se pudo mostrar el PDF. 
        <a href="documento_1.pdf" target="_blank">Abrir PDF</a></p>
    </object>
</div>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let t = 0;

/* GRID */
function drawGrid(){
    ctx.strokeStyle="#1e293b";
    for(let i=0;i<600;i+=40){
        ctx.beginPath();
        ctx.moveTo(i,0);
        ctx.lineTo(i,400);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0,i);
        ctx.lineTo(600,i);
        ctx.stroke();
    }
}

/* VALORES */
function actualizarValores(){
    vSpeed.innerText = speed.value;
    vScaleX.innerText = scaleX.value;
    vScaleY.innerText = scaleY.value;
    vFreqX.innerText = freqX.value;
    vFreqY.innerText = freqY.value;
}

/* ECUACIÓN */
function actualizarEcuacion(type){
    let eq="";
    if(type==="circle"){
        eq="x = a·cos(t), y = b·sin(t)";
    }
    if(type==="spiral"){
        eq="x = t·cos(t), y = t·sin(t)";
    }
    if(type==="lissajous"){
        eq="x = sin(at), y = sin(bt)";
    }
    document.getElementById("ecuacion").innerText=eq;
}

/* CURVA */
function drawCurve(){
    const speed=parseFloat(speedInput.value);
    const scaleX=parseFloat(scaleXInput.value);
    const scaleY=parseFloat(scaleYInput.value);
    const freqX=parseFloat(freqXInput.value);
    const freqY=parseFloat(freqYInput.value);
    const type=typeInput.value;

    ctx.beginPath();

    for(let i=0;i<600;i++){
        let tt=i*0.02;
        let x,y;

        if(type==="circle"){
            x=300+scaleX*Math.cos(tt+t);
            y=200+scaleY*Math.sin(tt+t);
        }

        if(type==="spiral"){
            let r=tt*5;
            x=300+r*Math.cos(tt+t)*(scaleX/100);
            y=200+r*Math.sin(tt+t)*(scaleY/100);
        }

        if(type==="lissajous"){
            x=300+scaleX*Math.sin(freqX*(tt+t));
            y=200+scaleY*Math.sin(freqY*(tt+t));
        }

        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    }

    ctx.strokeStyle="#22c55e";
    ctx.lineWidth=2;
    ctx.stroke();

    t+=speed;

    actualizarEcuacion(type);
}

/* ANIMACIÓN */
function animate(){
    ctx.clearRect(0,0,600,400);
    drawGrid();
    drawCurve();
    actualizarValores();
    requestAnimationFrame(animate);
}

function volverInicio(){
    window.location.href = "index.html";
}

const speedInput=document.getElementById("speed");
const scaleXInput=document.getElementById("scaleX");
const scaleYInput=document.getElementById("scaleY");
const freqXInput=document.getElementById("freqX");
const freqYInput=document.getElementById("freqY");
const typeInput=document.getElementById("type");

animate();
</script>

</body>
</html>
