<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mallas Poligonales</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:'Inter', sans-serif;
    background:linear-gradient(135deg,#020617,#020617,#0f172a);
    color:white;
    height:100vh;
    overflow:hidden;
}

/* TITULO MÁS PRO */
h2{
    text-align:center;
    color:#38bdf8;
    font-family:'Orbitron', sans-serif;
    letter-spacing:2px;
    text-shadow:0 0 15px rgba(56,189,248,0.6);
}

/* ECUACIÓN BONITA */
.ecuacion{
    margin-top:10px;
    padding:10px;
    text-align:center;
    font-family:'Orbitron', sans-serif;
    color:#22c55e;
    background:rgba(34,197,94,0.08);
    border-radius:10px;
    box-shadow:0 0 15px rgba(34,197,94,0.3);
}

/* SELECT MODERNO */
select{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:none;
    background:#1e293b;
    color:white;
    outline:none;
    cursor:pointer;
}

.back-btn{
    position:fixed; /* 🔥 clave: que no dependa del contenedor */
    top:20px;
    left:20px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    color:white;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 0 15px rgba(56,189,248,0.5);
    transition:0.3s;
    z-index:9999; /* 🔥 súper importante */
}

.back-btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 25px rgba(56,189,248,0.8);
}

/* CONTENEDOR */
.container{
    display:flex;
    height:100%;
    gap:10px;
    padding:10px;
}

/* PANEL BASE */
.left, .right{
    border-radius:20px;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(15px);
    box-shadow:0 20px 40px rgba(0,0,0,0.6);
    transition:0.3s;
}

.left:hover, .right:hover{
    transform:scale(1.005);
}

/* IZQUIERDA */
.left{
    width:50%;
    padding:20px;
    display:flex;
    flex-direction:column;
}

/* TITULO */
h2{
    text-align:center;
    color:#38bdf8;
    margin-bottom:10px;
    letter-spacing:1px;
    text-shadow:0 0 10px rgba(56,189,248,0.5);
}

/* CONTROLES */
.controls{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    box-shadow:inset 0 0 15px rgba(255,255,255,0.05);
}

/* GRUPOS */
.control-group{
    margin-bottom:15px;
}

/* LABEL */
label{
    font-size:13px;
    display:flex;
    justify-content:space-between;
    margin-bottom:5px;
    color:#cbd5f5;
}

/* SLIDER */
input[type="range"]{
    width:100%;
    appearance:none;
    height:6px;
    border-radius:10px;
    background:#1e293b;
    outline:none;
}

/* TRACK */
input[type="range"]::-webkit-slider-thumb{
    appearance:none;
    width:16px;
    height:16px;
    border-radius:50%;
    background:#38bdf8;
    cursor:pointer;
    box-shadow:0 0 10px #38bdf8;
    transition:0.2s;
}

input[type="range"]::-webkit-slider-thumb:hover{
    transform:scale(1.2);
}

/* CANVAS */
.canvas-container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

canvas{
    border-radius:15px;
    background:#020617;
    border:2px solid rgba(56,189,248,0.5);
    box-shadow:
        0 0 20px rgba(56,189,248,0.3),
        inset 0 0 30px rgba(0,0,0,0.8);
    transition:0.3s;
}

canvas:hover{
    box-shadow:
        0 0 30px rgba(56,189,248,0.6),
        inset 0 0 40px rgba(0,0,0,1);
}

/* DERECHA */
.right{
    width:50%;
    padding:15px;
    display:flex;
    flex-direction:column;
}

/* HEADER PDF */
.pdf-header{
    background:linear-gradient(90deg,#020617,#0f172a);
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    text-align:center;
    color:#38bdf8;
    font-weight:bold;
    letter-spacing:1px;
    box-shadow:0 0 15px rgba(56,189,248,0.3);
}

/* PDF */
.pdf-viewer{
    flex:1;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,0.7);
    border:1px solid rgba(255,255,255,0.05);
}

/* INFO */
.info{
    margin-top:10px;
    text-align:center;
    font-size:14px;
    color:#22c55e;
    padding:8px;
    border-radius:10px;
    background:rgba(34,197,94,0.08);
    box-shadow:0 0 10px rgba(34,197,94,0.2);
}
</style>
</head>

<body>
<button class="back-btn" onclick="volverInicio()">← Inicio</button>

<div class="container">

<!-- IZQUIERDA -->
<div class="left">

<h2>Mallas Poligonales</h2>

<div class="controls">

<div class="control-group">
<label>Tamaño <span id="vSize"></span></label>
<input type="range" id="size" min="50" max="200" value="100">
</div>

<div class="control-group">
<label>Rotación <span id="vAngle"></span></label>
<input type="range" id="angle" min="0" max="360" value="0">
</div>

<div class="control-group">
<label>Densidad Grid <span id="vGrid"></span></label>
<input type="range" id="grid" min="20" max="100" value="40">
</div>

<div class="info">
Representación: Wireframe (Malla de aristas)
</div>

</div>

<div class="canvas-container">
<canvas id="canvas" width="600" height="400"></canvas>
</div>

</div>

<!-- DERECHA -->
<div class="right">

<div class="pdf-viewer">
<object data="documento_2.pdf" type="application/pdf">
<p>No se pudo mostrar el PDF.
<a href="documento_2.pdf" target="_blank">Abrir PDF</a></p>
</object>
</div>

</div>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

/* GRID */
function drawGrid(){
    const grid = parseInt(gridInput.value);

    ctx.strokeStyle="#1e293b";

    for(let i=0;i<600;i+=grid){
        ctx.beginPath();
        ctx.moveTo(i,0);
        ctx.lineTo(i,400);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0,i);
        ctx.lineTo(600,i);
        ctx.stroke();
    }
}

/* VALORES */
function actualizarValores(){
    vSize.innerText = sizeInput.value;
    vAngle.innerText = angleInput.value + "°";
    vGrid.innerText = gridInput.value;
}

/* CUBO */
function drawCube(){
    const size = parseInt(sizeInput.value);
    const angle = parseFloat(angleInput.value) * Math.PI/180;

    const cx = 300;
    const cy = 200;

    function rotate(x,y){
        return {
            x: x*Math.cos(angle) - y*Math.sin(angle),
            y: x*Math.sin(angle) + y*Math.cos(angle)
        }
    }

    let points = [
        {x:-size,y:-size},
        {x:size,y:-size},
        {x:size,y:size},
        {x:-size,y:size}
    ];

    let front = points.map(p=>{
        let r = rotate(p.x,p.y);
        return {x: cx+r.x, y: cy+r.y};
    });

    let back = front.map(p=>({x:p.x+60,y:p.y-60}));

    ctx.strokeStyle="#38bdf8";
    ctx.lineWidth=2;

    for(let i=0;i<4;i++){
        ctx.beginPath();
        ctx.moveTo(front[i].x,front[i].y);
        ctx.lineTo(front[(i+1)%4].x,front[(i+1)%4].y);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(back[i].x,back[i].y);
        ctx.lineTo(back[(i+1)%4].x,back[(i+1)%4].y);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(front[i].x,front[i].y);
        ctx.lineTo(back[i].x,back[i].y);
        ctx.stroke();
    }
}

/* ANIMACIÓN */
function animate(){
    ctx.clearRect(0,0,600,400);
    drawGrid();
    drawCube();
    actualizarValores();
    requestAnimationFrame(animate);
}

function volverInicio(){
    window.location.href = "index.html";
}

const sizeInput=document.getElementById("size");
const angleInput=document.getElementById("angle");
const gridInput=document.getElementById("grid");

animate();
</script>

</body>
</html>
